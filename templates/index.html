<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fronius Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f3ee;
      --bg-soft: #fbf9f5;
      --panel: rgba(255, 252, 247, 0.92);
      --panel-strong: #fffdfa;
      --line: rgba(15, 23, 42, 0.08);
      --line-strong: rgba(15, 23, 42, 0.12);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f9f75;
      --accent-dark: #0b7f5d;
      --accent-2: #6d5efc;
      --accent-2-soft: rgba(109, 94, 252, 0.08);
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 8px 18px rgba(15, 23, 42, 0.05);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text);
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 56px;
      font-size: 1rem;
      background:
        radial-gradient(circle at top left, rgba(109, 94, 252, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(15, 159, 117, 0.08), transparent 22%),
        radial-gradient(circle at bottom center, rgba(15, 159, 117, 0.05), transparent 28%),
        var(--bg);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .hero-copy {
      flex: 1 1 320px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(1.5rem, 2vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: #1c1a16;
    }

    .sub {
      font-size: 0.94rem;
      color: var(--muted);
      line-height: 1.55;
      max-width: 560px;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0.68rem 1.05rem;
      border-radius: 12px;
      border: 1px solid rgba(109, 94, 252, 0.22);
      background: linear-gradient(135deg, rgba(109, 94, 252, 0.12), rgba(15, 159, 117, 0.08));
      color: var(--accent-2);
      font-size: 0.9rem;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(109, 94, 252, 0.10);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
      border-color: rgba(109, 94, 252, 0.34);
      background: linear-gradient(135deg, rgba(109, 94, 252, 0.18), rgba(15, 159, 117, 0.12));
      box-shadow: 0 12px 24px rgba(109, 94, 252, 0.14);
    }

    .source-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .source-select-wrap {
      position: relative;
    }

    .source-select-wrap select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--panel-strong);
      border: 1px solid #d8d5cf;
      border-radius: 12px;
      padding: 0.72rem 2.5rem 0.72rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #3a3835;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      letter-spacing: 0.01em;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      min-width: 305px;
    }

    .source-select-wrap select:hover {
      border-color: #bcb7b0;
      background: #fff;
    }

    .source-select-wrap select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 159, 117, 0.12);
    }

    .source-select-wrap::after {
      content: '';
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid #9aa0a6;
      pointer-events: none;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.45rem 1.55rem;
      margin-bottom: 1.1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #acaaa6;
      margin-bottom: 1rem;
    }

    #fileList {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88rem;
      color: #4d5562;
      line-height: 2.05;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .file-row {
      border-bottom: 1px solid #efebe4;
      padding: 5px 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: background 0.15s ease;
    }

    .file-row:hover { background: rgba(15, 159, 117, 0.05); }
    .file-row:last-child { border-bottom: none; }

    .fdot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      opacity: 0.55;
    }

    .fmsg { color: #b8b4ad; font-style: italic; font-size: 0.88rem; }

    .fields {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 0.5rem; }

    label {
      font-size: 0.8rem;
      color: #77736d;
      font-weight: 600;
    }

    input[type="date"], input[type="number"] {
      background: var(--bg-soft);
      border: 1px solid #ddd8d0;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.94rem;
      color: #1c1a16;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="date"] { width: 190px; }
    input[type="number"] { width: 110px; }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 159, 117, 0.10);
      background: #fff;
    }

    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions-note {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .btn-run {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.78rem 1.4rem;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      box-shadow: 0 10px 22px rgba(15, 159, 117, 0.18);
    }

    .btn-run:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn-run:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 0.95rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .dot.running { background: #d97706; animation: pulse 1s infinite; }
    .dot.done { background: #16a34a; }
    .dot.error { background: #a12c7b; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    #log {
      background: #fcfbf8;
      border: 1px solid #e8e2d9;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.84rem;
      line-height: 1.82;
      color: #1f2937;
      min-height: 260px;
      max-height: 460px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ok  { color: #2f7a1f; }
    .err { color: #a12c2c; }
    .dim { color: #beb9b0; }

    @media (max-width: 760px) {
      body { padding: 24px 14px 40px; }
      .card { padding: 1.15rem 1rem; }
      .source-select-wrap select { min-width: 100%; width: 100%; }
      .source-row { align-items: stretch; }
      .actions-row { align-items: stretch; }
      .btn-secondary, .btn-run { width: 100%; }
      .hero-actions { width: 100%; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-copy">
      <div class="eyebrow">Pipeline execution</div>
      <h1 id="pageTitle">Fronius Pipeline</h1>
      <div class="sub">Solar data ingestion · CrateDB &amp; InfluxDB</div>
    </div>
    <div class="hero-actions">
      <a href="/dashboard" class="btn-secondary">Dashboard</a>
    </div>
  </section>

  <div class="source-row">
    <div class="source-select-wrap">
      <select id="sourceSelect" onchange="switchSource(this.value)">
        <option value="fronius">Fronius (GitHub)</option>
        <option value="shared_drive">Balcão Digital (Google Drive)</option>
        <option value="drive_own">Balcão Digital - (Personal Folder Google Drive)</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="fileCardTitle">Files in repository</div>
    <div id="fileList"><span class="fmsg">Loading...</span></div>
  </div>

  <div class="card">
    <div class="card-title">Configuration</div>
    <div class="fields">
      <div class="field">
        <label for="start_date">Start date</label>
        <input type="date" id="start_date" />
      </div>
      <div class="field">
        <label for="days_back">Days back</label>
        <input type="number" id="days_back" value="10" min="1" max="365" />
      </div>
    </div>
    <div class="actions-row">
      <button class="btn-run" id="runBtn" onclick="runPipeline()">▶ Run pipeline</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Output log</div>
    <div class="status-row"><div class="dot" id="dot"></div><span id="status">ready</span></div>
    <div id="log"><span class="dim">— waiting for run —</span></div>
  </div>

<script>
  const today = new Date();
  const d = new Date(today.getFullYear(), 2, 1);
  d.setDate(d.getDate() - 10);
  document.getElementById("start_date").value = d.toISOString().split("T")[0];

  function switchSource(source) {
      if (source === "fronius") {
          document.getElementById("pageTitle").textContent = "Fronius Pipeline";
          document.querySelector(".sub").textContent = "Solar data ingestion · CrateDB & InfluxDB";
          document.getElementById("fileCardTitle").textContent = "Files in repository";
          loadFiles("fronius");
      } else if (source === "shared_drive") {
          document.getElementById("pageTitle").textContent = "Balcão Digital";
          document.querySelector(".sub").textContent = "Energy consumption data ingestion · CrateDB";
          document.getElementById("fileCardTitle").textContent = "Files in Google Drive (Tutor)";
          loadFiles("shared_drive");
      } else if (source === "drive_own") {
          document.getElementById("pageTitle").textContent = "Balcão Digital";
          document.querySelector(".sub").textContent = "Energy consumption data ingestion · CrateDB";
          document.getElementById("fileCardTitle").textContent = "Files in Google Drive (Own)";
          loadFiles("drive_own");
      }
  }

  function loadFiles(source = "fronius") {
      const list = document.getElementById("fileList");
      list.innerHTML = '<span class="fmsg">Loading...</span>';
      fetch(`/files?source=${source}`)
          .then(r => r.json())
          .then(data => {
              const files = data.files || [];
              if (!files.length) { list.innerHTML = '<span class="fmsg">No files found.</span>'; return; }
              list.innerHTML = files.map(f =>
                  `<div class="file-row"><span class="fdot"></span><span>${f}</span></div>`
              ).join("");
          })
          .catch(() => {
              list.innerHTML = '<span class="fmsg">Could not load file list.</span>';
          });
  }

  loadFiles();

  function setStatus(txt, state) {
    document.getElementById("status").textContent = txt;
    document.getElementById("dot").className = "dot" + (state ? " " + state : "");
  }

  function appendLine(txt, cls) {
    const log = document.getElementById("log");
    const ph = log.querySelector(".dim");
    if (ph) ph.remove();
    const div = document.createElement("div");
    if (cls) div.className = cls;
    div.textContent = txt;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  let evtSource = null;
  async function runPipeline() {
    const btn = document.getElementById("runBtn");
    const startDate = document.getElementById("start_date").value;
    const daysBack = parseInt(document.getElementById("days_back").value);
    document.getElementById("log").innerHTML = "";
    setStatus("running...", "running");
    btn.disabled = true;

    const res = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ start_date: startDate, days_back: daysBack, source: document.getElementById("sourceSelect").value }),
    });
    if (!res.ok) {
      const err = await res.json();
      appendLine("error: " + (err.error || "could not start"), "err");
      setStatus("error", "error"); btn.disabled = false; return;
    }

    if (evtSource) evtSource.close();
    evtSource = new EventSource("/stream");
    evtSource.onmessage = (e) => {
      if (e.data === "__DONE__") { evtSource.close(); setStatus("done", "done"); btn.disabled = false; return; }
      const cls = e.data.includes("error") || e.data.includes("❌") ? "err"
                : e.data.includes("✅") || e.data.includes("success") ? "ok" : null;
      appendLine(e.data, cls);
    };
    evtSource.onerror = () => {
      evtSource.close(); appendLine("connection lost", "err");
      setStatus("disconnected", "error"); btn.disabled = false;
    };
  }
</script>

</body>
</html>
